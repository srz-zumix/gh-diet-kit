name: Release drafter
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

jobs:
  draft_release:
    runs-on: ubuntu-latest
    permissions:
      # write permission is required to create a github release
      contents: write
      # write permission is required for autolabeler
      # otherwise, read permission is required at least
      pull-requests: write
      # for release workflow
      id-token: write
      attestations: write
    outputs:
      tag_name: ${{ steps.release-drafter.outputs.tag_name }}
    steps:
      - uses: release-drafter/release-drafter@ed4bc48ec97379be2258e7b7ac2624a3e26ab809 # v7.4.0
        id: release-drafter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bump_version_pr:
    needs: draft_release
    if: github.event_name != 'workflow_dispatch'
    uses: srz-zumix/go-gh-extension/.github/workflows/reusable-bump-version-pr.yml@a86e7120e8ece693df01b6f67c72af6a6fdc2d42 # v0.5.2
    permissions:
      contents: write
      pull-requests: write
    with:
      tag_name: ${{ needs.draft_release.outputs.tag_name }}

  publish_release:
    needs: draft_release
    uses: ./.github/workflows/release.yml
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      id-token: write
      attestations: write
    with:
      publish: true
      ref: ${{ needs.draft_release.outputs.tag_name }}
